<!doctype html>
<html>
	<head>
		<meta charset = "utf-8">
		<title>svg</title>
		<style>
			svg {
			  border: 1px solid #dddddd;
			}
		</style>
	</head>
	<body>
	<svg width="360" height="500">
		<rect x="5" y="5" width="350" height="490" rx="30" fill="lemonchiffon"/>
		<circle r="90" cx="115" cy="30%" fill="crimson"/>
		<ellipse rx="60" ry="80" cx="250" cy="30%" fill="gold" />
		<polygon points="125,255 105,255 115,235" fill="crimson" />
		<polygon points="240,240 260,240 250,230" fill="gold" />
		<polyline points="115,240 110,260 120,280 110,300 120,320 110,340" stroke="brown" stroke-width="2" fill="none" />
		<polyline points="250,230 240,250 250,270 240,290 250,310 240,330" stroke="brown" stroke-width="2" fill="none" />
	</svg>
	</body>
</html>
