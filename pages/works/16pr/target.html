<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<title>svg</title>
	<style>
		svg {
			border: 1px solid #dddddd;
		}
	</style>
</head>
<body>
	<svg width="300" height="290">		
		<rect width="300" height="290" fill="skyblue" />
		<rect width="300" height="100" y="190" fill="yellowgreen" />
		<rect width="15" height="35" rx="10" x="80" y="215" />
		<rect width="15" height="35" rx="10" x="200" y="215" />
		<circle r="100" cx="150" cy="150" fill="crimson" />
		<circle r="80" cx="150" cy="150" fill="white" />
		<circle r="60" cx="150" cy="150" fill="crimson" />
		<circle r="40" cx="150" cy="150" fill="white" />
		<circle r="20" cx="150" cy="150" fill="crimson" />
	</svg>
</body>
</html>
